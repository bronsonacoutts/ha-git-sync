# Maintenance / Git-related automations
# Loaded by Home Assistant via: automation: !include_dir_merge_list automations/
# See configuration.yaml.example for the required configuration.yaml entry.
#
# Each automation has a stable, unique id so it remains editable from the
# Home Assistant UI and can also be edited directly in this file on GitHub.
# Do not remove or change the id values — HA uses them to track automations
# across restarts and UI edits.

- alias: "[Maintenance] Git Pull on GitHub Webhook"
  id: 'maintenance_git_pull_on_github_webhook'
  description: "Pulls latest config from GitHub when notify-ha.yml fires. Source must be github-actions."
  trigger:
  - platform: webhook
    webhook_id: !secret git_sync_webhook_id
    allowed_methods:
      - POST
    local_only: false
  condition:
  - condition: template
    value_template: "{{ trigger.json.source | default('') == 'github-actions' }}"
  action:
  - action: shell_command.git_pull
    response_variable: pull_result
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ pull_result.return_code == 0 }}"
      sequence:
      - action: persistent_notification.create
        data:
          title: "✅ Git Sync"
          message: "Config pulled from GitHub successfully ({{ trigger.json.sha[:7] | default('unknown') }})."
    default:
    - action: persistent_notification.create
      data:
        title: "❌ Git Sync Failed"
        message: "Git pull failed (exit {{ pull_result.return_code }}). Check HA logs."
  mode: single

- alias: "[Maintenance] Push Git Config After UI Changes"
  id: '1767773315131'
  description: "Debounced push whenever the Lovelace dashboard is saved. 3 min quiet-window."
  trigger:
  - platform: event
    event_type: lovelace_updated
  condition: []
  action:
  - action: script.maintenance_git_push_config
  mode: single

- alias: "[Maintenance] Reload Automations After Git Sync"
  id: '1767772677262'
  description: "Reload automations after the git sync script (pull + push) completes."
  trigger:
  - platform: state
    entity_id: script.maintenance_git_sync_config
    from: "on"
    to: "off"
  condition: []
  action:
  - action: automation.reload
    data: {}
  mode: single

- alias: "[Maintenance] Nightly Config Backup"
  id: '1772117850002'
  description: "Commit and tag nightly backup at 03:00."
  trigger:
  - platform: time
    at: "03:00:00"
  condition: []
  action:
  - action: shell_command.git_nightly_backup
    response_variable: backup_result
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ backup_result.return_code == 0 }}"
      sequence:
      - action: persistent_notification.create
        data:
          title: "✅ Nightly Backup"
          message: "Nightly config backup completed."
    default:
    - action: persistent_notification.create
      data:
        title: "❌ Nightly Backup Failed"
        message: "Nightly backup failed (exit {{ backup_result.return_code }}). Check HA logs."
  mode: single

- alias: "[Maintenance] Weekly Config Snapshot"
  id: '1772117850003'
  description: "Create tar.gz snapshot every Sunday at 02:30."
  trigger:
  - platform: time
    at: "02:30:00"
  condition:
  - condition: time
    weekday:
    - sun
  action:
  - action: shell_command.git_weekly_snapshot
    response_variable: snap_result
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ snap_result.return_code == 0 }}"
      sequence:
      - action: persistent_notification.create
        data:
          title: "✅ Weekly Snapshot"
          message: "Weekly config snapshot completed."
    default:
    - action: persistent_notification.create
      data:
        title: "❌ Weekly Snapshot Failed"
        message: "Weekly snapshot failed (exit {{ snap_result.return_code }}). Check HA logs."
  mode: single

- alias: "[Maintenance] Monthly Backup Tag Cleanup"
  id: '1772117850004'
  description: "Prune backup/nightly-* tags older than 30 days on the 1st of each month."
  trigger:
  - platform: time
    at: "04:00:00"
  condition:
  - condition: template
    value_template: "{{ now().day == 1 }}"
  action:
  - action: shell_command.git_cleanup_backups
  mode: single
