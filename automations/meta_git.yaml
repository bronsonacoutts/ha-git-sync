# Maintenance / Git-related automations
# Loaded by Home Assistant via: automation: !include_dir_merge_list automations/
# See configuration.yaml.example for the required configuration.yaml entry.
#
# Each automation has a stable, unique id so it remains editable from the
# Home Assistant UI and can also be edited directly in this file on GitHub.
# Do not remove or change the id values — HA uses them to track automations
# across restarts and UI edits.

- alias: "[Maintenance] Reload Automations After Git Sync"
  id: '1767772677262'
  description: "Tags: [Domain: Maintenance, Trigger: Git Sync Complete, Action: Reload Automations]"
  trigger:
  - platform: state
    entity_id: script.maintenance_git_sync_config
    from: "on"
    to: "off"
  condition: []
  action:
  - action: automation.reload
    data: {}
  mode: single

- alias: "[Maintenance] Git Sync Hourly"
  id: '1767772690727'
  description: "Tags: Maintenance, Git, Sync, Schedule"
  trigger:
  - platform: time_pattern
    hours: "*"
    minutes: 0
  condition: []
  action:
  - target:
      entity_id: script.maintenance_git_sync_config
    action: script.turn_on
  mode: single

- alias: "[Maintenance] Push Git Config After UI Changes (lovelace_updated)"
  id: '1767773315131'
  description: "Tags: Maintenance, Git, Push, UI"
  trigger:
  - platform: event
    event_type: lovelace_updated
  condition: []
  action:
  - target:
      entity_id: script.maintenance_git_push_config
    action: script.turn_on
  mode: single

- alias: "[Maintenance] Git Sync Before Major Changes"
  id: '1772117850001'
  description: "Tags: Maintenance, Git, Sync, Pre-Edit"
  trigger:
  - platform: state
    entity_id: input_boolean.maintenance_major_changes
    to: "on"
  condition: []
  action:
  - target:
      entity_id: script.maintenance_git_sync_config
    action: script.turn_on
  - action: notify.persistent_notification
    data:
      message: "Git Sync triggered before major changes"
  mode: single

# Nightly backup of /config to GitHub
- alias: "[Maintenance] Nightly Config Backup"
  id: '1772117850002'
  description: "Tags: Maintenance, Git, Backup, Schedule"
  trigger:
  - platform: time
    at: "03:00:00"
  condition: []
  action:
  - action: shell_command.git_nightly_backup
  mode: single

# Weekly full config snapshot (tar.gz) committed to repo
- alias: "[Maintenance] Weekly Config Snapshot"
  id: '1772117850003'
  description: "Tags: Maintenance, Git, Snapshot, Schedule"
  trigger:
  - platform: time
    at: "02:30:00"
  condition:
  - condition: time
    weekday:
    - sun
  action:
  - action: shell_command.git_weekly_snapshot
  mode: single

# Webhook-triggered pull: fired by notify-ha.yml GitHub Actions workflow
# on every push/merge to main.
#
# LOOP PREVENTION
# ---------------
# The condition below skips the pull only when the webhook caller explicitly
# sends `source: "home-assistant"` in the JSON payload. The notify-ha.yml
# workflow always sends `source: "github-actions"`, so those pushes are
# allowed through. If you configure HA to POST back to GitHub after a push,
# set source to "home-assistant" in that call so this condition blocks the
# redundant pull and prevents a push→webhook→pull→push loop.
#
# SECRETS REQUIRED
# ----------------
# 1. Add to /config/secrets.yaml:
#      git_sync_webhook_id: "your-unique-webhook-id-here"
#    Generate a strong value:
#      python3 -c "import secrets; print(secrets.token_urlsafe(32))"
#
# 2. Add HA_WEBHOOK_URL as a GitHub Actions secret in your repo settings:
#      https://<your-ha-url>/api/webhook/<git_sync_webhook_id>
#
# 3. Ensure your HA instance is reachable from the internet
#    (Nabu Casa, Cloudflare Tunnel, or reverse proxy with TLS).
- alias: "[Maintenance] Git Pull on GitHub Webhook"
  id: 'maintenance_git_pull_on_github_webhook'
  description: "Tags: Maintenance, Git, Pull, Webhook — Pulls latest config from GitHub when notify-ha.yml fires. Skips if webhook payload contains source == 'home-assistant' (set that value in any HA-originated webhook call to prevent push→pull loops)."
  trigger:
  - platform: webhook
    webhook_id: !secret git_sync_webhook_id
    allowed_methods:
      - POST
    local_only: false
  condition:
  # Skip the pull only when the caller sends source == 'home-assistant'.
  # Calls from notify-ha.yml carry source == 'github-actions' and pass through.
  - condition: template
    value_template: "{{ trigger.json.source | default('') != 'home-assistant' }}"
  action:
  - action: shell_command.git_pull
  mode: single
