# examples/shell_commands.yaml
#
# Home Assistant shell_command definitions for git sync.
#
# INSTALLATION
# ------------
# Merge this block into your configuration.yaml under the `shell_command:` key.
# If shell_command is already defined, add only the two entries below to the
# existing block — do not duplicate the `shell_command:` key.
#
# The scripts are expected at /config/scripts/ (the standard HA config path).
# Adjust the paths if your config directory differs.

shell_command:
  git_push: "bash /config/scripts/ha-to-git.sh"
  git_pull: "bash /config/scripts/git-to-ha.sh"
