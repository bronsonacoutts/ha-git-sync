# examples/automations/git_sync_pull.yaml
#
# Home Assistant automation: pull the latest config from GitHub when the
# companion GitHub Actions workflow sends a webhook after a push to main.
#
# HOW IT WORKS
# ------------
# 1. You push a commit to the `main` branch of your config repository on GitHub.
# 2. The `.github/workflows/notify-ha.yml` workflow fires and POSTs to:
#      https://<your-ha-url>/api/webhook/<git_sync_webhook_id>
# 3. This automation fires, runs git-to-ha.sh, and notifies you via a
#    persistent notification.
#
# WEBHOOK ID SECURITY
# -------------------
# The webhook_id acts as a shared secret. Never hardcode it here.
# Store it in secrets.yaml and reference it with !secret:
#
#   secrets.yaml:
#     git_sync_webhook_id: "your-random-webhook-id"
#
# Generate a strong, random value, for example:
#   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
#
# Set the matching value as the HA_WEBHOOK_URL repo secret in GitHub:
#   https://<your-ha-url>/api/webhook/<git_sync_webhook_id>
# See docs/prerequisites.md for full instructions.
#
# INSTALLATION
# ------------
# Same as git_sync_push.yaml — use include_dir_merge_list or paste inline.
#
# PREREQUISITES
# -------------
#   1. shell_command.git_pull must be defined.
#      See examples/shell_commands.yaml.
#   2. The sync scripts must be installed and executable:
#        /config/scripts/git-to-ha.sh
#      Run: chmod +x /config/scripts/git-to-ha.sh
#   3. The secret `git_sync_webhook_id` must be set in secrets.yaml.
#   4. Your HA instance must be reachable from the internet (or from GitHub's
#      IP ranges) on port 443. A Nabu Casa / Home Assistant Cloud subscription
#      or a reverse-proxy setup satisfies this requirement.

- id: "git_sync_pull_on_webhook"
  alias: "Git Sync: Pull config from GitHub"
  description: >
    Pulls the latest config from GitHub when triggered by the
    notify-ha GitHub Actions workflow webhook.
  trigger:
    - platform: webhook
      webhook_id: !secret git_sync_webhook_id
      local_only: false
  condition: []
  action:
    - service: shell_command.git_pull
      response_variable: pull_result
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pull_result.return_code == 0 }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Git Sync"
                message: "Config pulled from GitHub successfully."
      default:
        - service: persistent_notification.create
          data:
            title: "Git Sync: Pull Failed"
            message: "Git pull failed (exit {{ pull_result.return_code }}). Check the HA logs or run git-to-ha.sh from the terminal."
  mode: single
