name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '30 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CodeQL"
            echo "- Analyzes GitHub Actions workflows and related security patterns."
            echo "- Review findings under Security > Code scanning alerts."
          } >> "$GITHUB_STEP_SUMMARY"
