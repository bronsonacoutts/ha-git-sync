name: Optional Automation Alias Auto-Correction

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  alias-autocorrect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whether optional auto-correction is enabled
        id: enabled
        shell: bash
        run: |
          if [ -f .github/automation-alias-autocorrect.enabled ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Automation alias auto-correction is enabled."
            {
              echo "## Optional Automation Alias Auto-Correction"
              echo "- Status: enabled"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Automation alias auto-correction is disabled (.github/automation-alias-autocorrect.enabled not found)."
            {
              echo "## Optional Automation Alias Auto-Correction"
              echo "- Status: disabled"
              echo "- To enable: create .github/automation-alias-autocorrect.enabled"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Python
        if: steps.enabled.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: steps.enabled.outputs.enabled == 'true'
        run: pip install pyyaml

      - name: Auto-correct automation aliases
        if: steps.enabled.outputs.enabled == 'true'
        id: fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path
          import yaml

          pattern = re.compile(r"^\[[^\]]+\]\s+.+")

          def to_title(text: str) -> str:
              tokens = re.split(r"(\s+)", text.strip())
              normalized = []
              for token in tokens:
                  if token.isspace() or token == "":
                      normalized.append(token)
                      continue
                  if token.isupper() and len(token) <= 4:
                      normalized.append(token)
                  else:
                      normalized.append(token.capitalize())
              return "".join(normalized).strip()

          def normalize_alias(alias: str | None, item: dict, area: str) -> str:
              base = (alias or "").strip()
              if not base:
                  base = str(item.get("id", "Automation")).strip() or "Automation"
              base = re.sub(r"^\[[^\]]+\]\s*", "", base).strip()
              base = re.sub(r"\s+", " ", base)
              base = to_title(base)
              if not base:
                  base = "Automation"
              return f"[{area}] {base}"

          files = []
          root = Path(".")

          top_level = root / "automations.yaml"
          if top_level.exists():
              files.append(top_level)

          automations_dir = root / "automations"
          if automations_dir.is_dir():
              files.extend(sorted(automations_dir.glob("*.yaml")))
              files.extend(sorted(automations_dir.glob("*.yml")))

          changed = False

          for file in files:
              try:
                  data = yaml.safe_load(file.read_text(encoding="utf-8"))
              except Exception:
                  continue

              if not isinstance(data, list):
                  continue

              if file.name == "automations.yaml":
                  area = "Automation"
              else:
                  area = re.sub(r"[_-]+", " ", file.stem).strip().title() or "Automation"

              file_changed = False
              for item in data:
                  if not isinstance(item, dict):
                      continue
                  alias = item.get("alias")
                  if isinstance(alias, str) and pattern.match(alias.strip()):
                      continue
                  new_alias = normalize_alias(alias if isinstance(alias, str) else None, item, area)
                  item["alias"] = new_alias
                  file_changed = True

              if file_changed:
                  file.write_text(
                      yaml.safe_dump(data, sort_keys=False, allow_unicode=True, width=1000),
                      encoding="utf-8"
                  )
                  changed = True
                  print(f"Updated aliases in {file}")

          print("CHANGED=true" if changed else "CHANGED=false")
          PY

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No alias corrections required."
            echo "- Result: no alias corrections required." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Alias corrections generated."
            echo "- Result: alias corrections generated and branch update will be pushed." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Configure git identity
        if: steps.fix.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push correction branch
        if: steps.fix.outputs.has_changes == 'true'
        run: |
          git checkout -B bot/automation-alias-autocorrect
          git add automations.yaml automations/*.yaml automations/*.yml 2>/dev/null || true
          git commit -m "chore: auto-correct automation aliases"
          git push --force-with-lease origin bot/automation-alias-autocorrect

      - name: Create or update pull request
        if: steps.fix.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          existing_pr_number="$(gh pr list --head bot/automation-alias-autocorrect --base main --state open --json number --jq '.[0].number')"

          if [ -n "$existing_pr_number" ]; then
            echo "Auto-correction PR #$existing_pr_number already open; branch updated."
            echo "- Result: updated existing PR #$existing_pr_number." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          gh pr create \
            --base main \
            --head bot/automation-alias-autocorrect \
            --title "chore: auto-correct automation alias names" \
            --body "Automated alias correction PR.\n\nThis PR updates automation aliases to follow the convention:\n\n`[Area] Action (Trigger/Context)`"

          echo "- Result: opened new auto-correction PR from bot/automation-alias-autocorrect to main." >> "$GITHUB_STEP_SUMMARY"
