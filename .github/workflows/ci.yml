name: CI

# Runs when config changes are pushed to main or develop.
# This workflow intentionally omits a pull_request trigger because the HA git sync
# pushes configuration changes directly to the repository in deployed config repos.
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          find scripts -type f \( -name "*.sh" -o -path "scripts/git_hooks/*" \) -print0 | xargs -0 shellcheck

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CI / shellcheck"
            echo "- Checked shell scripts under scripts/ and git hooks."
            echo "- Use local command: shellcheck scripts/*.sh scripts/git_hooks/*"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-automations:
    name: validate-automations
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Run automation validation
        run: python3 scripts/validate_automations.py .

      - name: Run automation validation tests
        run: python3 -m pip install --user pytest && python3 -m pytest tests/ -v

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CI / validate-automations"
            echo "- Validated automation ids (presence, uniqueness, UI-editable path)."
            echo "- Use local command: python3 scripts/validate_automations.py ."
          } >> "$GITHUB_STEP_SUMMARY"

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install yamllint
        run: |
          python3 -m pip install --user yamllint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create lint config
        run: |
          cat > .yamllint-ci.yaml <<'YAML'
          extends: default
          rules:
            line-length:
              max: 140
              level: warning
            truthy: disable
            indentation: disable
            comments-indentation: disable
          YAML

      - name: Run yamllint
        run: |
          set -euo pipefail
          yamllint -c .yamllint-ci.yaml .

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CI / yamllint"
            echo "- Checked YAML consistency across repository."
            echo "- Uses repository CI config at .yamllint-ci.yaml."
          } >> "$GITHUB_STEP_SUMMARY"
