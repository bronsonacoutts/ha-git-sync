name: Optional Upstream Sync PR

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upstream-sync-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whether optional sync is enabled
        id: enabled
        shell: bash
        run: |
          if [ -f .github/upstream-sync.enabled ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Optional upstream sync is enabled."
            {
              echo "## Optional Upstream Sync PR"
              echo "- Status: enabled"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Optional upstream sync is disabled (.github/upstream-sync.enabled not found)."
            {
              echo "## Optional Upstream Sync PR"
              echo "- Status: disabled"
              echo "- To enable: create .github/upstream-sync.enabled"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Configure git identity
        if: steps.enabled.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        if: steps.enabled.outputs.enabled == 'true'
        run: |
          git remote add upstream https://github.com/bronsonacoutts/ha-git-sync.git
          git fetch --no-tags upstream main

      - name: Merge upstream into sync branch
        if: steps.enabled.outputs.enabled == 'true'
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="bot/upstream-sync"

          git checkout -B "$BRANCH" origin/main

          set +e
          git merge --no-ff --no-edit upstream/main
          merge_exit_code=$?
          set -e

          if [ "$merge_exit_code" -ne 0 ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            git merge --abort || true
            echo "Upstream merge has conflicts. Resolve manually by merging upstream/main into your main branch."
            {
              echo "- Result: merge conflict detected."
              echo "- Action: merge upstream/main into main manually, then rerun workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if git diff --quiet origin/main..HEAD; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
            echo "No upstream updates to sync."
            echo "- Result: no upstream updates found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          echo "merge_conflict=false" >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.merge.outputs.has_updates == 'true'
        run: git push --force-with-lease origin bot/upstream-sync

      - name: Create or update pull request
        if: steps.merge.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          existing_pr_number="$(gh pr list --head bot/upstream-sync --base main --state open --json number --jq '.[0].number')"

          if [ -n "$existing_pr_number" ]; then
            echo "Sync PR #$existing_pr_number already open; branch updated."
            echo "- Result: updated existing PR #$existing_pr_number." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          gh pr create \
            --base main \
            --head bot/upstream-sync \
            --title "chore: sync updates from bronsonacoutts/ha-git-sync main" \
            --body "Automated upstream sync PR.\n\nThis PR merges the latest changes from `bronsonacoutts/ha-git-sync:main` into this repository."

          echo "- Result: opened new upstream sync PR from bot/upstream-sync to main." >> "$GITHUB_STEP_SUMMARY"
